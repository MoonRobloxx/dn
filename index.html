<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMLCraft - Браузерная строительная игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #gameCanvas {
            flex: 1;
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }
        
        #ui {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #444;
        }
        
        #inventory {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 600px;
        }
        
        .block-item {
            width: 50px;
            height: 50px;
            border: 2px solid #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .block-item:hover {
            border-color: #fff;
            transform: scale(1.1);
        }
        
        .block-item.selected {
            border-color: #ffff00;
            box-shadow: 0 0 10px #ffff00;
        }
        
        #info {
            text-align: right;
            font-size: 14px;
        }
        
        .controls {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div>
                <div id="inventory"></div>
                <div class="controls">
                    <p>WASD - движение | Мышь - камера | ЛКМ - поместить блок | ПКМ - удалить блок</p>
                </div>
            </div>
            <div id="info">
                <p>HTMLCraft v1.0</p>
                <p id="coords">X: 0 Y: 0</p>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
